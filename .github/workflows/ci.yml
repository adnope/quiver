name: CI Pipeline

on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend typecheck
        run: npm --prefix frontend run typecheck

      - name: Run frontend tests
        run: npm --prefix frontend run test

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run lint
        run: make lint

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Install Protobuf Compiler
        uses: arduino/setup-protoc@v3
        with:
          version: '35.0'

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11

      - name: Protobuf Freshness Check
        run: make proto-check

      - name: API Spec (Swagger) Freshness Check
        run: make openapi-check

      - name: Vector Shipper Verification
        run: make verify-vector-shipper

      - name: Run Unit Tests
        run: make test-unit

      - name: Start Integration Test Stack
        run: make test-up
      
      - name: Run Integration Tests
        run: make test-integration
      
      - name: Tear Down Integration Test Stack
        if: always()
        run: make test-down
      
      - name: Run Demo Verification Script
        run: make verify-demo
