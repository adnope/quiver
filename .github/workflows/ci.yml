name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run golangci-lint
        run: golangci-lint run cmd/... internal/...

      - name: Install Protobuf Compiler
        uses: arduino/setup-protoc@v3
        with:
          version: '35.0'

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11

      - name: Protobuf Freshness Check
        run: make proto-check

      - name: API Spec (Swagger) Freshness Check
        run: make openapi-check

      - name: Run Unit Tests
        run: make test-unit

      - name: Setup environment file
        run: cp .env.example .env

      - name: Start Services (Docker Compose)
        run: |
          docker compose up -d --build
          
          # Wait for TimescaleDB to be healthy
          for i in {1..30}; do
            if docker exec quiver-timescaledb pg_isready -U postgres -d quiver; then
              echo "TimescaleDB is healthy!"
              break
            fi
            echo "Waiting for TimescaleDB..."
            sleep 2
          done
          
          # Wait for Kafka to be healthy
          for i in {1..30}; do
            if docker exec quiver-kafka kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1; then
              echo "Kafka is healthy!"
              break
            fi
            echo "Waiting for Kafka..."
            sleep 2
          done

      - name: Run Integration Tests
        run: make test-integration

      - name: Run Demo Verification Script
        run: make verify-demo

      - name: Tear down Services
        if: always()
        run: docker compose down -v

  cd:
    name: Build & Push Docker Image
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: adnope/quiver:latest
