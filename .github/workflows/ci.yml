name: CI Pipeline

on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run golangci-lint
        run: golangci-lint run cmd/... internal/...

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Install Protobuf Compiler
        uses: arduino/setup-protoc@v3
        with:
          version: '35.0'

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11

      - name: Protobuf Freshness Check
        run: make proto-check

      - name: API Spec (Swagger) Freshness Check
        run: make openapi-check

      - name: Vector Shipper Verification
        run: make verify-vector-shipper

      - name: Run Unit Tests
        run: make test-unit

      - name: Setup environment file
        run: cp .env.example .env

      - name: Start Services (Docker Compose)
        run: |
          docker compose up -d --build
          
          # Wait for TimescaleDB to be healthy
          for i in {1..30}; do
            if docker exec ${COMPOSE_PROJECT_NAME:-quiver}-timescaledb pg_isready -U postgres -d quiver; then
              echo "TimescaleDB is healthy!"
              break
            fi
            echo "Waiting for TimescaleDB..."
            sleep 2
          done
          
          # Wait for Kafka to be healthy
          for i in {1..30}; do
            if docker exec ${COMPOSE_PROJECT_NAME:-quiver}-kafka kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1; then
              echo "Kafka is healthy!"
              break
            fi
            echo "Waiting for Kafka..."
            sleep 2
          done

      - name: Run Integration Tests
        run: make test-integration

      - name: Run Demo Verification Script
        run: make verify-demo

      - name: Tear down Services
        if: always()
        run: docker compose down -v
