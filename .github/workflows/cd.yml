name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      TEST_PROJECT: quiver-test-${{ github.run_id }}-${{ github.run_attempt }}
      VERIFY_PROJECT: quiver-verify-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend typecheck
        run: npm --prefix frontend run typecheck

      - name: Run frontend tests
        run: npm --prefix frontend run test

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run lint
        run: make lint

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Install Protobuf Compiler
        uses: arduino/setup-protoc@v3
        with:
          version: '35.0'

      - name: Install protoc-gen-go
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11

      - name: Protobuf Freshness Check
        run: make proto-check

      - name: API Spec Freshness Check
        run: make openapi-check

      - name: Vector Shipper Verification
        run: make verify-vector-shipper

      - name: Run Unit Tests
        run: make test-unit

      - name: Start Integration Test Stack
        run: make test-up TEST_PROJECT="${TEST_PROJECT}"

      - name: Run Integration Tests
        run: make test-integration

      - name: Tear Down Integration Test Stack
        if: always()
        run: make test-down TEST_PROJECT="${TEST_PROJECT}"

      - name: Run Demo Verification Script
        run: make verify-demo VERIFY_PROJECT="${VERIFY_PROJECT}"

  cd:
    name: Build & Push Docker Image
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get short SHA
        id: slug
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            adnope/quiver:latest
            adnope/quiver:sha-${{ steps.slug.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Client Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.client
          push: true
          tags: |
            adnope/quiver-client:latest
            adnope/quiver-client:sha-${{ steps.slug.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max