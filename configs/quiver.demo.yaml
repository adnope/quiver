server:
  http_addr: "${QUIVER_HTTP_ADDR}"

kafka:
  brokers:
    - "${KAFKA_BROKER_INTERNAL}"
  topics:
    raw: "${KAFKA_TOPIC_RAW}"
    dead_letter: "${KAFKA_TOPIC_DLQ}"

database:
  dsn: "${QUIVER_DATABASE_DSN}"
  schema: "quiver"
  max_open_conns: ${POSTGRES_POOL_SIZE}
  max_idle_conns: ${POSTGRES_MAX_IDLE_CONNS}
  conn_max_lifetime: "30m"
  conn_max_idle_time: "5m"

ingestion:
  publish_queue_size: 10000
  publisher_workers: 4

storage:
  retention:
    flow_records_days: 30
  columnstore:
    enabled: true
    after: "24h"

storage_writer:
  batch_size: 3000
  flush_interval: "1s"
  max_retries: 10
  initial_backoff: "100ms"
  max_backoff: "5s"
  concurrency: 8

api:
  max_request_body_bytes: 5242880
  cursor:
    hmac_secret_env: "QUIVER_API_CURSOR_SECRET"
  query:
    max_query_window: "7d"
    default_limit: 100
    max_limit: 1000
    aggregation_default_limit: 20
  rate_limits:
    ingest:
      requests_per_minute: 999999999
    query:
      requests_per_minute: 999999999
    metrics:
      requests_per_minute: 999999999
  health:
    auth_required: false
  metrics:
    auth_required: true
  keys:
    - name: "demo-admin"
      key_env: "QUIVER_DEMO_ADMIN_API_KEY"
      scopes: ["ingest", "query", "metrics"]

rest_ingest:
  enabled: true
  collector_id: "rest-ingest-main"
  max_batch_size: 1000
  api_keys:
    - name: "demo-client"
      source_host: "rest-demo-client"
      key_env: "REST_INGEST_DEMO_CLIENT_KEY"

zeek_ingest:
  enabled: true
  collector_id: "zeek-conn-http"
  max_batch_size: 1000

quiver_client_gateways:
  - name: "netflow-demo-gateway"
    source_host: "netflow-gateway-01"
    key_env: "NETFLOW_GATEWAY_DEMO_KEY"
  - name: "zeek-demo-shipper"
    source_host: "zeek-probe-01"
    key_env: "ZEEK_SHIPPER_DEMO_KEY"

collectors:
  netflow_v5:
    - enabled: true
      collector_id: "netflow-main"
      listen_addr: "0.0.0.0:${NETFLOW_PORT}"
      read_buffer_bytes: 4194304
      packet_buffer_bytes: 65535
      auth_required: false

dead_letter:
  max_raw_packet_bytes: 1500

shutdown:
  timeout: "10s"
