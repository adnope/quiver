server:
  http_addr: "0.0.0.0:8080"

kafka:
  brokers:
    - "kafka:9092"
  topics:
    raw: "flow.raw"
    dead_letter: "flow.dead_letter"

database:
  dsn: "${QUIVER_DATABASE_DSN}"
  schema: "quiver"
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime: "30m"
  conn_max_idle_time: "5m"

ingestion:
  publish_queue_size: 10000
  publisher_workers: 4

storage:
  retention:
    flow_records_days: 30
  columnstore:
    enabled: true
    after: "24h"

storage_writer:
  batch_size: 3000
  flush_interval: "1s"
  max_retries: 10
  initial_backoff: "100ms"
  max_backoff: "5s"
  concurrency: 8

api:
  max_request_body_bytes: 5242880
  cursor:
    hmac_secret_env: "QUIVER_API_CURSOR_SECRET"
  query:
    max_query_window: "7d"
    default_limit: 100
    max_limit: 1000
    aggregation_default_limit: 20
  rate_limits:
    ingest:
      requests_per_minute: 60
    query:
      requests_per_minute: 120
    metrics:
      requests_per_minute: 60
  health:
    auth_required: false
  metrics:
    auth_required: true
  keys:
    - name: "demo-admin"
      key_env: "QUIVER_DEMO_ADMIN_API_KEY"
      scopes: ["ingest", "query", "metrics"]

rest_ingest:
  enabled: true
  collector_id: "rest-ingest-main"
  max_batch_size: 1000
  api_keys:
    - name: "demo-client"
      source_host: "rest-demo-client"
      key_env: "REST_INGEST_DEMO_CLIENT_KEY"

zeek_ingest:
  enabled: true
  collector_id: "zeek-conn-http"
  max_batch_size: 1000

quiver_client_gateways:
  - name: "netflow-demo-gateway"
    source_host: "netflow-gateway-01"
    key_env: "NETFLOW_GATEWAY_DEMO_KEY"
    allowed_collector_ids: ["netflow-main", "netflow-v9-main"]
  - name: "zeek-demo-shipper"
    source_host: "zeek-probe-01"
    key_env: "ZEEK_SHIPPER_DEMO_KEY"
    allowed_collector_ids: ["netflow-main"]

proxy_netflow:
  routes:
    - version: 5
      collector_id: "netflow-main"
    - version: 9
      collector_id: "netflow-v9-main"

collectors:
  restart:
    policy: "always"
    initial_backoff: "1s"
    max_backoff: "30s"
    max_restarts: 0
  instances:
    - type: "netflow_v5"
      collector_id: "netflow-main"
      enabled: true
      restart:
        policy: "always"
        initial_backoff: "1s"
        max_backoff: "30s"
        max_restarts: 0
      settings:
        listen_addr: "0.0.0.0:2055"
        read_buffer_bytes: 4194304
        packet_buffer_bytes: 65535
        auth_required: true
    - type: "netflow_v9"
      collector_id: "netflow-v9-main"
      enabled: true
      restart:
        policy: "always"
        initial_backoff: "1s"
        max_backoff: "30s"
        max_restarts: 0
      settings:
        template_ttl: "30m"
        cleanup_interval: "1m"
        exporter_idle_timeout: "5m"
        sampling_rate: 1
        max_packet_bytes: 65535
        max_exporters: 100
        max_templates_per_exporter: 100
        max_templates_total: 1000
        max_fields_per_template: 100
        max_record_bytes: 4096
        max_unknown_field_bytes: 1024
        max_attributes_bytes: 4096
        worker_count: 4
        queue_capacity: 1000
        max_queue_bytes: 10485760
        pending:
          max_wait: "1m"
          max_bytes_per_exporter: 1048576
          max_bytes_total: 10485760
    - type: "zeek_conn_tcp"
      collector_id: "zeek-conn-tcp-main"
      enabled: false
      restart:
        policy: "always"
        initial_backoff: "1s"
        max_backoff: "30s"
        max_restarts: 0
      settings:
        listen_addr: "127.0.0.1:4770"
        max_connections: 32
        auth_timeout: "5s"
        idle_timeout: "60s"
        max_line_bytes: 1048576
        batch_size: 100
        flush_interval: "1s"
        trust_peer_ip: false

observability:
  metrics_save_interval: "5s"
  metrics_aggregate_bucket_width: "5s"
  metrics_aggregate_max_points: 1000

dead_letter:
  max_raw_packet_bytes: 1500

shutdown:
  timeout: "10s"
