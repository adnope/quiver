services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: ${COMPOSE_PROJECT_NAME:-quiver}-timescaledb
    # cpus: 2.0
    # mem_limit: 2g
    env_file:
      - .env
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quiver"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  kafka:
    build:
      context: .
      dockerfile_inline: |
        FROM edenhill/kcat:1.7.1 AS kcat
        FROM confluentinc/cp-kafka:8.2.2
        USER root
        COPY --from=kcat / /opt/kcat/
        RUN mkdir -p /tmp/kraft-combined-logs && chown appuser:appuser /tmp/kraft-combined-logs
        USER appuser
    container_name: ${COMPOSE_PROJECT_NAME:-quiver}-kafka
    # cpus: 1.0
    # mem_limit: 1024m
    ports:
      - "${KAFKA_HOST_PORT:-9094}:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-9094}'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "LD_LIBRARY_PATH=/opt/kcat/lib:/opt/kcat/usr/lib /opt/kcat/lib/ld-musl-x86_64.so.1 /opt/kcat/usr/bin/kcat -b localhost:9092 -L >/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 15
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  migration:
    image: migrate/migrate:v4.19.1
    container_name: ${COMPOSE_PROJECT_NAME:-quiver}-migration
    # cpus: 0.25
    # mem_limit: 128m
    volumes:
      - ./internal/storage/postgres/migrations:/migrations
    command: -path=/migrations -database="${QUIVER_DATABASE_DSN}" up
    depends_on:
      timescaledb:
        condition: service_healthy

  quiver:
    build: .
    # cpus: 1
    # mem_limit: 256m
    command: ["-config", "${QUIVER_CONFIG:-/configs/quiver.dev.yaml}"]
    env_file:
      - .env
    environment:
      - QUIVER_DATABASE_DSN_HOST=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}?sslmode=${POSTGRES_SSLMODE}
      - KAFKA_BROKER_EXTERNAL=kafka:9092
    volumes:
      - ./configs:/configs
    expose:
      - "${QUIVER_INTERNAL_PORT}"
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

  quiver-lb:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-quiver}-lb
    # cpus: 0.10
    # mem_limit: 128m
    env_file:
      - .env
    ports:
      - "${QUIVER_HOST_PORT}:${QUIVER_INTERNAL_PORT}"
    command:
      - /bin/sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<EOF
        resolver 127.0.0.11 valid=5s ipv6=off;

        server {
          listen ${QUIVER_INTERNAL_PORT};

          location / {
            proxy_pass http://quiver:${QUIVER_INTERNAL_PORT};
            proxy_http_version 1.1;
            proxy_set_header Host \$$host;
            proxy_set_header X-Real-IP \$$remote_addr;
            proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$$scheme;
          }
        }
        EOF
        nginx -g 'daemon off;'
    depends_on:
      quiver:
        condition: service_started

  quiver-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: ${COMPOSE_PROJECT_NAME:-quiver}-client
    # cpus: 0.15
    # mem_limit: 128m
    command: ["--backend-url", "http://quiver-lb:8080", "--api-key", "${NETFLOW_GATEWAY_DEMO_KEY}", "--listen-addr", "0.0.0.0:2055"]
    env_file:
      - .env
    ports:
      - "${NETFLOW_PORT}:2055/udp"
    depends_on:
      quiver-lb:
        condition: service_started

volumes:
  timescaledb_data:
  kafka_data:
