version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errcheck
    - gosec
    - govet
    - ineffassign
    - nilerr
    - revive
    - staticcheck
    - unused
  settings:
    revive:
      rules:
        # Initial Quiver internal package APIs are still being shaped across phases.
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
