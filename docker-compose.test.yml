services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: ${COMPOSE_PROJECT_NAME:-quiver-test}-timescaledb
    environment:
      POSTGRES_DB: quiver
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - quiver_test_db_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "shared_buffers=512MB", "-c", "max_wal_size=4GB", "-c", "synchronous_commit=off", "-c", "work_mem=16MB"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quiver"]
      interval: 3s
      timeout: 3s
      retries: 10

  kafka:
    image: redpandadata/redpanda:latest
    container_name: ${COMPOSE_PROJECT_NAME:-quiver-test}-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:9094
      - --advertise-kafka-addr=internal://kafka:9092,external://localhost:9096
    ports:
      - "9096:9094"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  migration:
    image: migrate/migrate:v4.19.1
    container_name: ${COMPOSE_PROJECT_NAME:-quiver-test}-migration
    volumes:
      - ./internal/storage/postgres/migrations:/migrations
    command: -path=/migrations -database="postgres://postgres:postgres@timescaledb:5432/quiver?sslmode=disable" up
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  quiver_test_db_data: