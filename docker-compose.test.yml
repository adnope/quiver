services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: ${COMPOSE_PROJECT_NAME:-quiver-test}-timescaledb
    environment:
      POSTGRES_DB: quiver
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5439:5432"
    volumes:
      - quiver_test_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quiver"]
      interval: 3s
      timeout: 3s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:8.2.2
    container_name: ${COMPOSE_PROJECT_NAME:-quiver-test}-kafka
    ports:
      - "9098:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9096'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 3s
      timeout: 3s
      retries: 15

  migration:
    image: migrate/migrate:v4.19.1
    container_name: ${COMPOSE_PROJECT_NAME:-quiver-test}-migration
    volumes:
      - ./internal/storage/postgres/migrations:/migrations
    command: -path=/migrations -database="postgres://postgres:postgres@timescaledb:5432/quiver?sslmode=disable" up
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  quiver_test_db_data:
